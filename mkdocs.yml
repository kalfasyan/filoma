site_name: filoma
site_description: Fast, multi-backend file and directory analysis for Python
theme:
  name: material

nav:
  - Overview: index.md
  - Getting Started:
      - Quickstart: getting-started/quickstart.md
      - Installation: getting-started/installation.md
      - Comparisons: getting-started/comparisons.md
  - Use Cases:
      - Audit a Dataset: use-cases/audit.md
      - Explore a Dataset: use-cases/explore.md
      - Deduplicate a Dataset: use-cases/dedup.md
      - Talk to Your Data: use-cases/agent.md
  - Guides:
      - Interactive CLI: guides/cli.md
      - Core Concepts: guides/concepts.md
      - Directory Scanning: guides/scanning.md
      - DataFrame Workflow: guides/dataframe.md
      - File & Image Profiling: guides/profiling.md
      - Duplicate Detection: guides/dedup.md
      - AI Agent (Filaraki): guides/filaraki.md
      - Semantic Search (RAG): guides/rag.md
      - Data Integrity & Quality: guides/data-integrity.md
      - Dataset Management: guides/dataset.md
      - Advanced Usage: guides/advanced-usage.md
  - Tutorials:
      - Main Demo: tutorials/demo.md
      - Roboflow Dataset: tutorials/roboflow_demo.md
      - Cookbook: tutorials/cookbook.md
  - Reference:
      - API Reference: reference/api.md
      - Architecture: reference/architecture.md
      - Backends: reference/backends.md
      - Performance: reference/benchmarks.md
      - Data Quality: reference/data-quality.md
      - Life after filoma: reference/life-after-filoma.md
  - Roadmap:
      - Adoption Roadmap: roadmap/adoption.md

plugins:
  - search
  - mkdocstrings

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra:
  repo_url: https://github.com/filoma/filoma
